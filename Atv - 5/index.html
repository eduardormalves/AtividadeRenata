<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="formulario">

        <form>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">

            <label for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" name="nascimento">

            <label for="curso">Curso:</label>
            <select id="curso" name="curso">
                <option value="">Selecione um curso</option>
                <option value="engenharia_software">Engenharia de Software</option>
                <option value="ciencia_computacao">Ciência da Computação</option>
            </select>

            <fieldset>
                <legend>Sexo:</legend>
                <input type="radio" id="masculino" name="sexo" value="masculino">
                <label for="masculino">Masculino</label><br>
                <input type="radio" id="feminino" name="sexo" value="feminino">
                <label for="feminino">Feminino</label><br>
                <input type="radio" id="outro" name="sexo" value="outro">
                <label for="outro">Outro</label>
            </fieldset>

            <fieldset>
                <legend>Interesses:</legend>
                <input type="checkbox" id="tecnologia" name="interesses" value="tecnologia">
                <label for="tecnologia">Tecnologia</label><br>
                <input type="checkbox" id="esportes" name="interesses" value="esportes">
                <label for="esportes">Esportes</label><br>
                <input type="checkbox" id="musica" name="interesses" value="musica">
                <label for="musica">Música</label><br>
                <input type="checkbox" id="leitura" name="interesses" value="leitura">
                <label for="leitura">Leitura</label><br>
                <input type="checkbox" id="jogos" name="interesses" value="jogos">
                <label for="jogos">Jogos</label>
            </fieldset>

            <label for="comentarios">Comentários:</label>
            <textarea id="comentarios" name="comentarios" rows="4"></textarea>

            <label for="foto">Upload de foto:</label>
            <input type="file" id="foto" name="foto" accept="image/*">

            <button type="submit">Enviar</button>
        </form>

    </section>

</body>
</html>
